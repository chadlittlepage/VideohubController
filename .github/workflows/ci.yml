name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Python syntax check
        run: |
          python -m py_compile \
            src/videohub_controller/app.py \
            src/videohub_controller/connection.py \
            src/videohub_controller/presets.py \
            src/videohub_controller/settings_window.py \
            src/videohub_controller/manual_window.py \
            src/videohub_controller/about_window.py \
            src/videohub_controller/console_log.py
          echo "All files compile OK"

  test:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-cov pyobjc-core pyobjc-framework-Cocoa
      - name: Run tests with coverage floor
        run: PYTHONPATH=src python -m pytest tests/ -v
                --cov=videohub_controller
                --cov-config=.coveragerc
                --cov-report=term
                --cov-fail-under=50

  security:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps + scanners
        # Don't install our own package (we're a desktop app, not on PyPI).
        # Just install the runtime deps we ship so pip-audit scans the
        # actual surface a user would have at runtime.
        run: |
          pip install pyobjc-core pyobjc-framework-Cocoa
          pip install pip-audit bandit
      - name: pip-audit (CVE scan on the actual deps we ship)
        # CVE-2026-3219 is in pip itself (tar/ZIP confusion during install).
        # We ship a compiled .app — end users never run pip — so this is
        # not in our threat model. Ignored explicitly until a fix ships
        # upstream so we can spot any *real* new vuln.
        run: pip-audit --desc --strict --ignore-vuln CVE-2026-3219
      - name: bandit (static security analysis)
        # -ll -ii: only high-confidence, high-severity issues
        run: bandit -r src/ -ll -ii
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-size-budget:
    # The DMG isn't built in CI (would need notary creds + signing), but we
    # can size-check anything that ships with the source. Caps creeping fat
    # dependencies before they hit a real build.
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Source size budget (≤ 5 MB checked-in src tree)
        run: |
          SIZE=$(du -sk src/ | awk '{print $1}')
          echo "src/ size: ${SIZE} KB"
          if [ "$SIZE" -gt 5120 ]; then
            echo "::error::src/ is ${SIZE} KB, exceeds 5120 KB budget"
            exit 1
          fi
